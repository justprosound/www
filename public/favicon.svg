<svg xmlns="http://www.w3.org/2000/svg" width="240" height="40" viewBox="0 0 240 40">
  <!-- Light version for Dark Backgrounds -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: Perfectly Balanced Signal -->
  <g transform="translate(0, 4)">
    <rect x="0" y="12" width="3" height="8" rx="1.5" fill="url(#goldGrad)" />
    <rect x="6" y="8" width="3" height="16" rx="1.5" fill="url(#goldGrad)" />
    <rect x="12" y="4" width="3" height="24" rx="1.5" fill="url(#goldGrad)" />
    <rect x="18" y="0" width="3" height="32" rx="1.5" fill="url(#goldGrad)" />
    <rect x="24" y="4" width="3" height="24" rx="1.5" fill="url(#goldGrad)" />
    <rect x="30" y="8" width="3" height="16" rx="1.5" fill="url(#goldGrad)" />
    <rect x="36" y="12" width="3" height="8" rx="1.5" fill="url(#goldGrad)" />
  </g>
  <!-- Brand Text -->
  <text x="50" y="27" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF" letter-spacing="0.1em">JUST ENOUGH SOUND</text>
</svg>
