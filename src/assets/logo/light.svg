<svg xmlns="http://www.w3.org/2000/svg" width="240" height="40" viewBox="0 0 240 40">
  <!-- Just Enough Sound - Blue Ring Signature (Light Version) -->
  <defs>
    <linearGradient id="ringBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#008cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Connector Icon with Signature Blue Ring -->
  <g transform="translate(0, 4)">
    <!-- Connector Body (Simplified XLR/Ethercon silhouette) -->
    <rect x="0" y="6" width="32" height="20" rx="2" fill="#333" />
    <!-- The Signature Blue Ring (Collar) -->
    <rect x="24" y="4" width="6" height="24" rx="1" fill="url(#ringBlue)" />
    <!-- Contacts -->
    <circle cx="6" cy="16" r="1.5" fill="#555" />
    <circle cx="12" cy="16" r="1.5" fill="#555" />
    <circle cx="18" cy="16" r="1.5" fill="#555" />
  </g>

  <!-- Identity Text -->
  <text x="45" y="27" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="19" fill="#FFFFFF" letter-spacing="0.05em">JUST ENOUGH SOUND</text>
</svg>
